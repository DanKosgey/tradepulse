<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KickTrades – Manual Trader</title>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #ffffff;
      --bg2: #f4f6fa;
      --bg3: #eef0f5;
      --border: #e0e4ee;
      --text: #0d1117;
      --text2: #5a6478;
      --text3: #8b95a9;
      --accent: #1a56db;
      --accent2: #0ea5e9;
      --over: #00c4a3;
      --under: #e53e3e;
      --header: #1a2236;
      --nav-active: #fff;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOP NAV ── */
    .topbar {
      background: var(--header);
      display: flex;
      align-items: center;
      padding: 0 16px;
      height: 48px;
      gap: 4px;
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-right: 12px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: #e53e3e;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg {
      width: 16px;
      height: 16px;
      fill: white;
    }

    .logo-text {
      color: white;
      font-weight: 700;
      font-size: 14px;
      line-height: 1;
    }

    .logo-sub {
      color: #8b95a9;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: .5px;
    }

    .nav-btn {
      background: transparent;
      border: none;
      color: #b0bcd4;
      padding: 6px 12px;
      border-radius: 6px;
      font: 500 12px var(--sans);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background .15s, color .15s;
    }

    .nav-btn:hover {
      background: rgba(255, 255, 255, .08);
      color: #fff;
    }

    .nav-btn.active {
      background: #2563eb;
      color: #fff;
    }

    .nav-btn svg {
      width: 14px;
      height: 14px;
      opacity: .8;
    }

    .topbar-right {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }

    .btn-login {
      background: transparent;
      border: 1.5px solid #4a90d9;
      color: #4a90d9;
      padding: 5px 16px;
      border-radius: 6px;
      font: 600 12px var(--sans);
      cursor: pointer;
    }

    .btn-signup {
      background: #e53e3e;
      border: none;
      color: #fff;
      padding: 5px 16px;
      border-radius: 6px;
      font: 600 12px var(--sans);
      cursor: pointer;
    }

    /* ── SYMBOL BAR ── */
    .symbol-bar {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .symbol-pill {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: border-color .15s;
    }

    .symbol-pill:hover {
      border-color: var(--accent);
    }

    .symbol-badge {
      background: #1a56db;
      color: white;
      font-size: 9px;
      font-weight: 700;
      border-radius: 3px;
      padding: 1px 4px;
    }

    .symbol-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e53e3e;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .4
      }
    }

    .symbol-name {
      font: 600 13px var(--sans);
      color: var(--text);
    }

    .symbol-price {
      font: 500 13px var(--mono);
    }

    .symbol-change {
      font: 400 11px var(--sans);
    }

    .symbol-change.down {
      color: #e53e3e;
    }

    .symbol-change.up {
      color: #00c4a3;
    }

    /* ── MAIN ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── CHART AREA ── */
    .chart-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* timeframe tabs */
    .chart-tools {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      border-bottom: 1px solid var(--border);
    }

    .tf-btn {
      background: transparent;
      border: none;
      padding: 4px 8px;
      font: 500 11px var(--mono);
      color: var(--text3);
      cursor: pointer;
      border-radius: 4px;
    }

    .tf-btn.active {
      background: var(--accent);
      color: white;
    }

    .chart-icon {
      background: transparent;
      border: none;
      color: var(--text3);
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
    }

    .chart-icon:hover {
      background: var(--bg2);
    }

    /* canvas */
    .chart-wrap {
      position: relative;
      flex: 1;
      overflow: hidden;
    }

    #priceChart {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* crosshair label */
    .price-label {
      position: absolute;
      right: 0;
      background: #1a2236;
      color: white;
      font: 600 12px var(--mono);
      padding: 3px 8px;
      border-radius: 4px 0 0 4px;
      pointer-events: none;
      transform: translateY(-50%);
    }

    /* digit bar */
    .digit-bar {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 8px;
      padding: 8px 16px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .digit-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      position: relative;
    }

    .digit-ring {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font: 700 14px var(--sans);
      border: 2.5px solid var(--border);
      background: white;
      transition: border-color .15s;
      position: relative;
    }

    .digit-ring canvas {
      position: absolute;
      top: -2px;
      left: -2px;
      width: 46px;
      height: 46px;
    }

    .digit-ring.selected {
      border-color: #1a56db;
      background: #eff6ff;
      color: #1a56db;
    }

    .digit-ring.hot {
      border-color: #e53e3e;
    }

    .digit-ring.warm {
      border-color: #f97316;
    }

    .digit-pct {
      font: 400 10px var(--mono);
      color: var(--text3);
    }

    .digit-arrow {
      font-size: 10px;
    }

    .digit-arrow.up {
      color: var(--over);
    }

    .digit-arrow.down {
      color: var(--under);
    }

    /* ── Y-AXIS labels ── */
    .yaxis {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 60px;
      pointer-events: none;
    }

    /* ── TRADE PANEL ── */
    .trade-panel {
      width: 260px;
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
      background: white;
    }

    .panel-header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      font: 500 11px var(--sans);
      color: var(--text3);
    }

    .trade-type-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
    }

    .trade-type-label {
      font: 600 13px var(--sans);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .type-icon {
      font-size: 16px;
    }

    .section {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }

    .section-label {
      font: 500 11px var(--sans);
      color: var(--text3);
      margin-bottom: 8px;
      text-align: center;
    }

    /* ticks slider */
    .ticks-track {
      height: 4px;
      background: var(--bg3);
      border-radius: 2px;
      position: relative;
      margin: 8px 0;
    }

    .ticks-fill {
      height: 4px;
      background: var(--accent);
      border-radius: 2px;
      width: 40%;
    }

    .ticks-thumb {
      width: 14px;
      height: 14px;
      background: #1a2236;
      border-radius: 50%;
      position: absolute;
      top: -5px;
      left: 40%;
      transform: translateX(-50%);
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0, 0, 0, .2);
    }

    .ticks-val {
      text-align: center;
      font: 700 13px var(--mono);
      margin-top: 4px;
    }

    /* digit picker */
    .digit-picker {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
    }

    .dpick-btn {
      border: 1.5px solid var(--border);
      background: var(--bg2);
      color: var(--text);
      font: 600 13px var(--mono);
      border-radius: 6px;
      padding: 7px 0;
      cursor: pointer;
      transition: all .15s;
      text-align: center;
    }

    .dpick-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .dpick-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* stake */
    .stake-tabs {
      display: flex;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .stake-tab {
      flex: 1;
      padding: 7px 0;
      text-align: center;
      font: 600 12px var(--sans);
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text3);
    }

    .stake-tab.active {
      background: #1a2236;
      color: white;
    }

    .stake-row {
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 0 10px;
    }

    .stake-minus,
    .stake-plus {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: var(--text2);
      padding: 4px 6px;
    }

    .stake-val {
      flex: 1;
      text-align: center;
      font: 700 15px var(--mono);
    }

    .stake-currency {
      font: 500 11px var(--sans);
      color: var(--text3);
    }

    /* payout */
    .payout-row {
      margin-bottom: 8px;
    }

    .payout-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .payout-lbl {
      font: 500 11px var(--sans);
      color: var(--text3);
    }

    .payout-val {
      font: 700 13px var(--mono);
      color: var(--text);
    }

    .trade-btn {
      width: 100%;
      border: none;
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font: 700 14px var(--sans);
      transition: opacity .15s, transform .1s;
    }

    .trade-btn:active {
      transform: scale(.98);
    }

    .trade-btn:hover {
      opacity: .92;
    }

    .trade-btn.over {
      background: var(--over);
      color: white;
      margin-bottom: 6px;
    }

    .trade-btn.under {
      background: var(--under);
      color: white;
    }

    .trade-btn-icon {
      font-size: 16px;
    }

    .trade-pct {
      font: 600 13px var(--mono);
      opacity: .9;
    }

    /* connection badge */
    .conn-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font: 500 10px var(--mono);
      color: var(--text3);
      padding: 6px 14px;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }

    .conn-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #e53e3e;
      transition: background .3s;
    }

    .conn-dot.connected {
      background: #00c4a3;
    }

    .conn-dot.connecting {
      background: #f59e0b;
      animation: pulse 1s infinite;
    }

    /* status bar */
    .status-bar {
      background: var(--bg2);
      border-top: 1px solid var(--border);
      padding: 4px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      font: 400 11px var(--mono);
      color: var(--text3);
      flex-shrink: 0;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background: #00c4a3;
      border-radius: 50%;
    }

    /* toast */
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a2236;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font: 500 13px var(--sans);
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
    }

    /* scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }
  </style>
</head>

  <script>
    // ─── CONFIG ───────────────────────────────────────────────
    const APP_ID = 1089;
    const WS_URL = `wss://ws.binaryws.com/websockets/v3?app_id=${APP_ID}`;
    const SYMBOL = 'R_100';
    const HISTORY = 120;           // ticks to preload

    // ─── STATE ────────────────────────────────────────────────
    let ws, wsReady = false;
    let ticks = [];          // {epoch, quote}
    let prices = [];
    let digitCounts = new Array(10).fill(0);
    let digitTotal = 0;
    let selectedDigit = 5;
    let stake = 10;
    let proposalSub = null;
    let tickSubId = null;
    const pendingCbs = {};

    // ─── WebSocket ────────────────────────────────────────────
    function connect() {
      setConn('connecting');
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        wsReady = true;
        setConn('connected');
        send({ ping: 1 });
        loadHistory();
      };

      ws.onmessage = ({ data }) => {
        const msg = JSON.parse(data);
        if (msg.msg_type === 'ping') { send({ ping: 1 }); return; }
        route(msg);
      };

      ws.onclose = () => {
        wsReady = false;
        setConn('disconnected');
        setTimeout(connect, 3000);
      };

      ws.onerror = () => ws.close();
    }

    function send(obj) {
      if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj));
    }

    function route(msg) {
      const t = msg.msg_type;
      if (t === 'history') onHistory(msg);
      else if (t === 'tick') onTick(msg);
      else if (t === 'proposal') onProposal(msg);
      else if (t === 'error') console.warn('[WS error]', msg.error?.message);
    }

    // ─── HISTORY ──────────────────────────────────────────────
    function loadHistory() {
      send({
        ticks_history: SYMBOL,
        count: HISTORY,
        end: 'latest',
        style: 'ticks',
        subscribe: 1
      });
    }

    function onHistory(msg) {
      const h = msg.history;
      if (!h) return;
      tickSubId = msg.subscription?.id;
      ticks = h.times.map((t, i) => ({ epoch: +t, quote: +h.prices[i] }));
      prices = ticks.map(t => t.quote);
      ticks.forEach(t => addDigit(t.quote));
      renderChart();
      renderDigitBar();
      updatePriceDisplay(ticks[ticks.length - 1]?.quote);
      requestProposals();
    }

    function onTick(msg) {
      const t = msg.tick;
      if (!t) return;
      const entry = { epoch: t.epoch, quote: +t.quote };
      ticks.push(entry);
      prices.push(entry.quote);
      if (ticks.length > 300) { ticks.shift(); prices.shift(); }
      addDigit(entry.quote);
      renderChart();
      renderDigitBar();
      updatePriceDisplay(entry.quote);
    }

    function addDigit(q) {
      const d = Math.floor(q * 10) % 10;
      digitCounts[d]++;
      digitTotal++;
    }

    // ─── CHART ────────────────────────────────────────────────
    const canvas = document.getElementById('priceChart');
    const ctx = canvas.getContext('2d');
    const labelEl = document.getElementById('priceLabel');

    function renderChart() {
      const W = canvas.parentElement.clientWidth;
      const H = canvas.parentElement.clientHeight;
      canvas.width = W;
      canvas.height = H;

      if (prices.length < 2) return;

      const pad = { t: 20, r: 64, b: 10, l: 10 };
      const cW = W - pad.l - pad.r;
      const cH = H - pad.t - pad.b;

      const min = Math.min(...prices);
      const max = Math.max(...prices);
      const range = max - min || 1;

      const toX = i => pad.l + (i / (prices.length - 1)) * cW;
      const toY = v => pad.t + (1 - (v - min) / range) * cH;

      // y-axis grid
      ctx.clearRect(0, 0, W, H);
      const steps = 5;
      ctx.strokeStyle = '#e8ecf4';
      ctx.lineWidth = 1;
      for (let i = 0; i <= steps; i++) {
        const v = min + (range / steps) * i;
        const y = toY(v);
        ctx.beginPath();
        ctx.moveTo(pad.l, y);
        ctx.lineTo(W - pad.r, y);
        ctx.stroke();
        // label
        ctx.fillStyle = '#8b95a9';
        ctx.font = '9px IBM Plex Mono';
        ctx.textAlign = 'right';
        ctx.fillText(v.toFixed(2), W - 4, y + 3);
      }

      // area fill
      const grad = ctx.createLinearGradient(0, pad.t, 0, H - pad.b);
      grad.addColorStop(0, 'rgba(26,86,219,0.12)');
      grad.addColorStop(1, 'rgba(26,86,219,0)');

      ctx.beginPath();
      ctx.moveTo(toX(0), toY(prices[0]));
      for (let i = 1; i < prices.length; i++) ctx.lineTo(toX(i), toY(prices[i]));
      ctx.lineTo(toX(prices.length - 1), H - pad.b);
      ctx.lineTo(toX(0), H - pad.b);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();

      // line
      ctx.beginPath();
      ctx.moveTo(toX(0), toY(prices[0]));
      for (let i = 1; i < prices.length; i++) ctx.lineTo(toX(i), toY(prices[i]));
      ctx.strokeStyle = '#1a56db';
      ctx.lineWidth = 1.5;
      ctx.lineJoin = 'round';
      ctx.stroke();

      // last dot
      const lx = toX(prices.length - 1);
      const ly = toY(prices[prices.length - 1]);
      ctx.beginPath();
      ctx.arc(lx, ly, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#1a56db';
      ctx.fill();

      // dashed horizontal
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(lx, ly);
      ctx.lineTo(W - pad.r, ly);
      ctx.strokeStyle = '#1a2236';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.setLineDash([]);

      // price label
      labelEl.style.top = (ly + canvas.offsetTop) + 'px';
      labelEl.textContent = prices[prices.length - 1]?.toFixed(2) ?? '–';

      // x-axis time labels
      ctx.fillStyle = '#8b95a9';
      ctx.font = '9px IBM Plex Mono';
      ctx.textAlign = 'center';
      const every = Math.floor(prices.length / 6);
      for (let i = 0; i < prices.length; i += every) {
        if (!ticks[i]) continue;
        const d = new Date(ticks[i].epoch * 1000);
        const lbl = d.toTimeString().slice(0, 5);
        ctx.fillText(lbl, toX(i), H - 2);
      }
    }

    // ─── DIGIT BAR ────────────────────────────────────────────
    function renderDigitBar() {
      const bar = document.getElementById('digitBar');
      bar.innerHTML = '';
      for (let d = 0; d < 10; d++) {
        const pct = digitTotal > 0 ? ((digitCounts[d] / digitTotal) * 100).toFixed(1) : '0.0';
        const item = document.createElement('div');
        item.className = 'digit-item';

        // determine heat
        const maxC = Math.max(...digitCounts);
        const minC = Math.min(...digitCounts);
        let heatClass = '';
        if (digitCounts[d] === maxC) heatClass = 'hot';
        else if (digitCounts[d] >= maxC * .9) heatClass = 'warm';

        // last digit of last price
        const lastQ = prices[prices.length - 1];
        const lastD = lastQ !== undefined ? Math.floor(lastQ * 10) % 10 : -1;

        item.innerHTML = `
      <div class="digit-pct">${pct}%</div>
      <div class="digit-ring ${d === selectedDigit ? 'selected' : ''} ${heatClass}">${d}</div>
      ${d === lastD ? `<div class="digit-arrow down">▲</div>` : '<div class="digit-arrow"></div>'}
    `;
        item.onclick = () => { selectedDigit = d; renderDigitBar(); updateDigitPicker(); requestProposals(); };
        bar.appendChild(item);
      }
    }

    // ─── PANEL: DIGIT PICKER ──────────────────────────────────
    function buildDigitPicker() {
      const picker = document.getElementById('digitPicker');
      picker.innerHTML = '';
      for (let d = 0; d < 10; d++) {
        const b = document.createElement('button');
        b.className = 'dpick-btn' + (d === selectedDigit ? ' active' : '');
        b.textContent = d;
        b.onclick = () => { selectedDigit = d; updateDigitPicker(); renderDigitBar(); requestProposals(); };
        picker.appendChild(b);
      }
    }

    function updateDigitPicker() {
      document.querySelectorAll('.dpick-btn').forEach((b, i) => {
        b.className = 'dpick-btn' + (i === selectedDigit ? ' active' : '');
      });
    }

    // ─── STAKE ────────────────────────────────────────────────
    document.getElementById('stakeMinus').onclick = () => {
      if (stake > 1) { stake = Math.max(1, stake - 1); document.getElementById('stakeVal').textContent = stake; requestProposals(); }
    };
    document.getElementById('stakePlus').onclick = () => {
      stake++; document.getElementById('stakeVal').textContent = stake; requestProposals();
    };

    // ─── PROPOSALS ────────────────────────────────────────────
    let propTimer = null;
    function requestProposals() {
      clearTimeout(propTimer);
      propTimer = setTimeout(_doProposals, 300);
    }

    function _doProposals() {
      if (!wsReady) return;
      // forget old
      if (proposalSub) { send({ forget: proposalSub }); proposalSub = null; }

      // Over: last digit OVER selectedDigit
      send({
        proposal: 1,
        subscribe: 1,
        amount: stake,
        basis: 'stake',
        contract_type: 'DIGITOVER',
        currency: 'AUD',
        duration: 5,
        duration_unit: 't',
        symbol: SYMBOL,
        barrier: selectedDigit.toString()
      });
    }

    function onProposal(msg) {
      if (msg.error) { console.warn('Proposal error:', msg.error.message); return; }
      const p = msg.proposal;
      if (!p) return;
      proposalSub = msg.subscription?.id;

      const payout = p.payout?.toFixed(2);
      const ct = p.contract_type;

      if (ct === 'DIGITOVER') {
        const pct = ((p.payout / stake - 1) * 100 + 100).toFixed(2);
        document.getElementById('overPayout').textContent = `${payout} AUD`;
        document.getElementById('overPct').textContent = `${((p.payout / stake) * 100).toFixed(2)}%`;

        // request under too
        send({
          proposal: 1,
          amount: stake,
          basis: 'stake',
          contract_type: 'DIGITUNDER',
          currency: 'AUD',
          duration: 5,
          duration_unit: 't',
          symbol: SYMBOL,
          barrier: selectedDigit.toString()
        });
      } else if (ct === 'DIGITUNDER') {
        document.getElementById('underPayout').textContent = `${payout} AUD`;
        document.getElementById('underPct').textContent = `${((p.payout / stake) * 100).toFixed(2)}%`;
      }
    }

    // ─── PRICE DISPLAY ────────────────────────────────────────
    let prevPrice = null;
    function updatePriceDisplay(q) {
      if (!q) return;
      const el = document.getElementById('symbolPrice');
      const ch = document.getElementById('symbolChange');
      el.textContent = q.toFixed(2);
      if (prevPrice !== null) {
        const diff = q - prevPrice;
        const pct = ((diff / prevPrice) * 100).toFixed(2);
        const sign = diff >= 0 ? '+' : '';
        ch.textContent = `${sign}${diff.toFixed(2)} (${sign}${pct}%)`;
        ch.className = 'symbol-change ' + (diff >= 0 ? 'up' : 'down');
        el.style.color = diff >= 0 ? 'var(--over)' : 'var(--under)';
        setTimeout(() => el.style.color = '', 400);
      }
      prevPrice = q;

      // status bar time
      const now = new Date();
      document.getElementById('statusTime').textContent =
        now.toISOString().replace('T', ' ').slice(0, 19) + ' GMT';
    }

    // ─── TRADE (demo — no auth) ───────────────────────────────
    function placeTrade(dir) {
      showToast(`⚡ ${dir.toUpperCase()} trade sent — log in to execute real trades`);
    }

    // ─── CONNECTION STATE ─────────────────────────────────────
    function setConn(state) {
      const dot = document.getElementById('connDot');
      const lbl = document.getElementById('connLabel');
      dot.className = 'conn-dot ' + state;
      lbl.textContent = state === 'connected' ? 'Connected to Deriv WS'
        : state === 'connecting' ? 'Connecting…' : 'Reconnecting…';
    }

    // ─── TOAST ────────────────────────────────────────────────
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ─── RESIZE ───────────────────────────────────────────────
    window.addEventListener('resize', renderChart);

    // ─── BOOT ────────────────────────────────────────────────
    buildDigitPicker();
    connect();
  </script>
</body>
