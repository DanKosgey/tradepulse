── TASK 8: WebSocket Message Queue ────────────────────────────
File: src/hooks/useDerivWS.js

Problem: Messages sent before the WebSocket is fully OPEN are 
silently dropped, causing missed trades and silent failures.

Fix:
- Add a messageQueue = [] ref inside useDerivWS
- Modify the send() function:
  * If ws.readyState !== WebSocket.OPEN, push to messageQueue
  * If OPEN, send immediately
- In the ws.onopen handler, flush the queue:
    while (messageQueue.current.length > 0) {
      ws.send(JSON.stringify(messageQueue.current.shift()))
    }
- Add a maximum queue size of 50 to prevent memory bloat

── TASK 9: Cap Tick History to Prevent Memory Leak ───────────
File: src/hooks/useDerivWS.js (or wherever ticks state lives)

Problem: The ticks object grows unbounded over long sessions, 
causing performance issues on low-end devices.

Fix:
- When appending new ticks to state, cap the array at the last
  500 ticks per symbol:
    setTicks(prev => {
      const updated = [...(prev[symbol] || []), newTick]
      return { ...prev, [symbol]: updated.slice(-500) }
    })

