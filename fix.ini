── TASK 1: Fix OAuth2 Login Callback ──────────────────────────
File: src/App.jsx (and/or src/context/DerivContext.jsx)

Problem: When Deriv redirects back after OAuth login, the URL 
contains hash params like:
  /#acct1=CR123&token1=abc123&cur1=USD
The app does not parse these, so OAuth login silently fails.

Fix:
- On app mount (useEffect with []), check window.location.hash
- Parse all token/account pairs: acct1+token1, acct2+token2, etc.
- Call the existing login(token) function from DerivContext with
  the first token found (token1)
- Optionally store all acct/token pairs for multi-account support
- After parsing, clear the hash from the URL using:
  window.history.replaceState(null, '', window.location.pathname)
- Add a helper utility function parseDerivOAuthHash() in a new
  file: src/utils/authUtils.js

── TASK 2: Add Proposal Request Before Every Buy ──────────────
Files: src/deriv.js, src/botEngine.js, src/hooks/useDerivWS.js

Problem: Contracts are bought blindly without first requesting
a price quote (proposal), which risks buying at wrong payouts.

Fix:
- In useDerivWS.js, add a sendProposal(params) function that:
    * Sends a proposal request to the WebSocket
    * Returns a Promise that resolves when the matching 
      proposal response arrives (match by req_id or echo_req)
    * Rejects after a 10-second timeout
- In botEngine.js, inside _executeTrade() (or equivalent buy 
  logic), BEFORE the buy call:
    1. Call sendProposal({ 
         proposal: 1,
         amount: stake,
         basis: 'stake',
         contract_type: contractType,
         currency: currency,
         duration: duration,
         duration_unit: durationUnit,
         symbol: symbol
       })
    2. Await the proposal response
    3. Log the payout to the bot activity log
    4. Only then call buy({ buy: proposal_id, price: ask_price })
- Handle proposal errors gracefully (log and skip the trade, 
  do not crash the bot)

